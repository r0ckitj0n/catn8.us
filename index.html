<!DOCTYPE html>

  <title>catn8.us - A Fun Place for Families!</title>
  <meta name="description" content="catn8.us - Games, stories, and interactive family fun.">

  <script>
    (function injectAppearanceStylesheet() {
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = '/api/appearance.css.php';
      document.head.appendChild(link);
    })();

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <script>
    (function setPageInfo() {
      var path = (window.location.pathname || '/').toLowerCase();
      var page = 'home';
      var routes = {
        '/': 'home',
        '/index.php': 'home',
        '/about': 'about',
        '/about.php': 'about',
        '/activities': 'activities',
        '/activities.php': 'activities',
        '/accumul8': 'accumul8',
        '/accumul8.php': 'accumul8',
        '/accumul8/index.php': 'accumul8',
        '/valid8': 'valid8',
        '/valid8/': 'valid8',
        '/valid8.php': 'valid8',
        '/valid8/index.php': 'valid8',
        '/coloring': 'coloring',
        '/coloring.php': 'coloring',
        '/build-wizard.php': 'build_wizard',
        '/build_wizard.php': 'build_wizard',
        '/stories': 'stories',
        '/stories.php': 'stories',
        '/games': 'games',
        '/games.php': 'games',
        '/arcade': 'arcade',
        '/arcade.php': 'arcade',
        '/login': 'login',
        '/login.php': 'login',
        '/mystery': 'mystery',
        '/mystery.php': 'mystery',
        '/sheriff_station': 'sheriff_station',
        '/sheriff_station.php': 'sheriff_station',
        '/settings': 'settings',
        '/settings.php': 'settings',
        '/wordsearch': 'wordsearch',
        '/wordsearch.php': 'wordsearch',
        '/photo-albums': 'photo_albums',
        '/photo-albums.php': 'photo_albums',
        '/frogger': 'frogger',
        '/frogger-game': 'frogger',
        '/frogger-game.php': 'frogger',
        '/asteroids': 'asteroids',
        '/asteroids-game': 'asteroids',
        '/asteroids-game.php': 'asteroids',
        '/tetris': 'tetris',
        '/tetris-game': 'tetris',
        '/tetris-game.php': 'tetris',
        '/verify': 'verify',
        '/verify.php': 'verify',
        '/reset': 'reset',
        '/reset.php': 'reset'
      };

      if (routes[path]) {
        page = routes[path];
      } else if (path.endsWith('.php')) {
        page = path.replace(/^\//, '').replace(/\.php$/, '') || 'home';
      }

      if (page === 'mystery' || page === 'sheriff_station') {
        document.documentElement.classList.add('catn8-noir-mode');
      }

      window.__CATN8_PAGE__ = page;
    })();
  </script>
</head>
<body>
  <div id="catn8-app"></div>

  <noscript>
    <p>This application requires JavaScript to run.</p>
  </noscript>

  <script>
    (function setRootDataPage() {
      var root = document.getElementById('catn8-app');
      if (!root) return;
      root.dataset.page = window.__CATN8_PAGE__ || 'home';
    })();
  </script>
  <script>
    (async function loadCatn8AppBundle() {
      var head = document.head || document.getElementsByTagName('head')[0];
      var loaded = false;

      function appendCss(href) {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = href;
        head.appendChild(link);
      }

      function appendModule(src) {
        var script = document.createElement('script');
        script.type = 'module';
        script.src = src;
        head.appendChild(script);
      }

      function appendModuleInline(code) {
        var script = document.createElement('script');
        script.type = 'module';
        script.textContent = code;
        head.appendChild(script);
      }

      function collectManifestCss(manifest, entry) {
        var cssFiles = [];
        var visited = {};

        function visit(node) {
          if (!node || typeof node !== 'object') return;
          var key = String(node.file || '');
          if (key && visited[key]) return;
          if (key) visited[key] = true;

          var ownCss = Array.isArray(node.css) ? node.css : [];
          ownCss.forEach(function (file) {
            if (cssFiles.indexOf(file) === -1) cssFiles.push(file);
          });

          var imports = Array.isArray(node.imports) ? node.imports : [];
          imports.forEach(function (importKey) {
            var child = manifest && manifest[String(importKey)];
            if (child) visit(child);
          });
        }

        visit(entry);
        return cssFiles;
      }

      function normalizeOrigin(value) {
        var raw = String(value || '').trim().replace(/\/+$/, '');
        if (!raw) return '';
        if (!/^https?:\/\//i.test(raw)) {
          raw = window.location.protocol + '//' + raw;
        }
        return raw.replace(/\/+$/, '');
      }

      function isLocalDevHost() {
        var host = String(window.location.hostname || '').toLowerCase();
        return host === 'localhost' || host === '127.0.0.1' || host === '::1';
      }

      if (isLocalDevHost()) {
        try {
          var hotResp = await fetch('/hot?ts=' + Date.now(), { cache: 'no-store' });
          if (hotResp.ok) {
            var hotOrigin = normalizeOrigin(await hotResp.text());
            if (hotOrigin) {
              var refreshUrl = '';
              var clientUrl = '';
              var appUrl = '';
              try {
                refreshUrl = new URL('/@react-refresh', hotOrigin).toString();
                clientUrl = new URL('/@vite/client', hotOrigin).toString();
                appUrl = new URL('/src/entries/app.tsx', hotOrigin).toString();
              } catch (_hotUrlErr) {
                refreshUrl = '';
              }

              if (refreshUrl && clientUrl && appUrl) {
                appendModuleInline(
                  'import RefreshRuntime from ' + JSON.stringify(refreshUrl) + ';' +
                  'RefreshRuntime.injectIntoGlobalHook(window);' +
                  'window.$RefreshReg$ = () => {};' +
                  'window.$RefreshSig$ = () => (type) => type;' +
                  'window.__vite_plugin_react_preamble_installed__ = true;'
                );
                appendModule(clientUrl);
                appendModule(appUrl);
                loaded = true;
              }
            }
          }
        } catch (_hotErr) {
          // no-op: fallback to dist manifest
        }
      }

      if (loaded) {
        return;
      }

      try {
        var manifestResp = await fetch('/dist/.vite/manifest.json?ts=' + Date.now(), { cache: 'no-store' });
        if (!manifestResp.ok) {
          throw new Error('manifest not found');
        }
        var manifest = await manifestResp.json();
        var entry = manifest && (manifest['src/entries/app.tsx'] || manifest['index.html']);
        if (!entry || !entry.file) {
          throw new Error('manifest entry missing');
        }
        var css = collectManifestCss(manifest, entry);
        css.forEach(function (file) {
          appendCss('/dist/' + String(file).replace(/^\/+/, ''));
        });
        appendModule('/dist/' + String(entry.file).replace(/^\/+/, ''));
        loaded = true;
      } catch (_distErr) {
        // final fallback: direct source path for environments that proxy /src through Vite
      }

      if (!loaded) {
        appendModule('/src/entries/app.tsx');
      }
    })();
  </script>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    window.addEventListener('load', function () {
      try { window.AOS && window.AOS.init({ duration: 1000, once: true }); } catch (_err) {}
    });
  </script>
</body>
</html>
